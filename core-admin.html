<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bellweather – CORE Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&display=swap" rel="stylesheet">
<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
<style>
:root {
  --navy: #282828;
  --navy-light: #363636;
  --slate: #3d4f6f;
  --steel: #6b7d9e;
  --silver: #a8b5cc;
  --cloud: #dde3ed;
  --snow: #f4f6f9;
  --white: #ffffff;
  --gold: #c8953e;
  --gold-light: #f5e6cc;
  --gold-dim: rgba(200,149,62,0.12);
  --green: #2d8a5e;
  --green-bg: #e8f5ee;
  --red: #b94444;
  --red-bg: #fce8e8;
  --amber: #c17a2a;
  --radius: 8px;
  --shadow: 0 1px 3px rgba(26,39,68,0.08), 0 4px 12px rgba(26,39,68,0.05);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: var(--snow); color: var(--navy); min-height: 100vh; }

/* Header */
.header { background: var(--navy); color: var(--white); padding: 0 32px; display: flex; align-items: stretch; justify-content: space-between; }
.header-left { display: flex; align-items: center; gap: 16px; padding: 12px 0; }
.header-logo { height: 44px; object-fit: contain; }
.header-subtitle { font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500; color: var(--silver); text-transform: uppercase; letter-spacing: 2.5px; margin-top: 2px; }
.header-right { display: flex; align-items: center; gap: 12px; }
.conn-indicator { display: flex; align-items: center; gap: 6px; }
.conn-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--amber); }
.conn-label { font-size: 11px; color: var(--silver); }

/* Login */
#loginOverlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--snow); z-index: 100; }
.login-card { background: var(--white); border-radius: 12px; box-shadow: var(--shadow); padding: 48px 40px; text-align: center; max-width: 400px; width: 100%; }
.login-title { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 600; margin-bottom: 8px; }
.login-subtitle { font-size: 13px; color: var(--steel); margin-bottom: 32px; line-height: 1.5; }
.btn-login { background: var(--gold); color: var(--white); border: none; border-radius: var(--radius); padding: 12px 28px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.15s; }
.btn-login:hover { background: var(--amber); }
.login-error { margin-top: 14px; font-size: 12px; color: var(--red); display: none; }

/* Main */
#appContainer { display: none; max-width: 800px; margin: 0 auto; padding: 32px 24px; }
.page-title { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 600; margin-bottom: 4px; }
.page-subtitle { font-size: 13px; color: var(--steel); margin-bottom: 28px; }

/* Add row */
.add-row { display: flex; gap: 10px; margin-bottom: 24px; align-items: center; }
.add-row input, .add-row select { border: 1.5px solid var(--cloud); border-radius: var(--radius); padding: 9px 13px; font-size: 13px; font-family: 'DM Sans', sans-serif; color: var(--navy); background: var(--white); outline: none; transition: border-color 0.15s; }
.add-row input:focus, .add-row select:focus { border-color: var(--gold); }
.add-row input { flex: 1; }
.add-row select { width: 150px; }

/* Buttons */
.btn { border: none; border-radius: var(--radius); padding: 9px 18px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.15s; }
.btn-primary { background: var(--gold); color: var(--white); }
.btn-primary:hover { background: var(--amber); }
.btn-sm { padding: 5px 12px; font-size: 12px; }
.btn-ghost { background: transparent; color: var(--steel); border: 1.5px solid var(--cloud); }
.btn-ghost:hover { background: var(--cloud); color: var(--navy); }
.btn-danger { background: transparent; color: var(--red); border: 1.5px solid #f0c0c0; }
.btn-danger:hover { background: var(--red-bg); }
.btn-save { background: var(--green); color: var(--white); }
.btn-save:hover { background: #236e4a; }

/* Table */
.members-table { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
.table-header { display: grid; grid-template-columns: 1fr 140px 80px 100px; gap: 0; padding: 10px 16px; background: var(--cloud); font-size: 11px; font-weight: 600; color: var(--steel); text-transform: uppercase; letter-spacing: 0.06em; }
.member-row { display: grid; grid-template-columns: 1fr 140px 80px 100px; gap: 0; padding: 12px 16px; border-bottom: 1px solid var(--snow); align-items: center; transition: background 0.1s; }
.member-row:last-child { border-bottom: none; }
.member-row:hover { background: var(--snow); }
.member-row.editing { background: var(--gold-dim); }
.member-name { font-size: 14px; font-weight: 500; color: var(--navy); }
.member-dept { font-size: 13px; color: var(--steel); }
.active-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 12px; }
.active-badge.yes { background: var(--green-bg); color: var(--green); }
.active-badge.no { background: var(--cloud); color: var(--steel); }
.row-actions { display: flex; gap: 6px; justify-content: flex-end; }

/* Inline edit */
.edit-input { border: 1.5px solid var(--gold); border-radius: 5px; padding: 5px 9px; font-size: 13px; font-family: 'DM Sans', sans-serif; color: var(--navy); background: var(--white); outline: none; width: 100%; }
.edit-select { border: 1.5px solid var(--gold); border-radius: 5px; padding: 5px 9px; font-size: 13px; font-family: 'DM Sans', sans-serif; color: var(--navy); background: var(--white); outline: none; width: 100%; }

/* Empty state */
.empty-state { padding: 48px; text-align: center; color: var(--steel); font-size: 14px; }

/* Toast */
.toast { position: fixed; bottom: 24px; right: 24px; background: var(--navy); color: var(--white); padding: 12px 20px; border-radius: var(--radius); font-size: 13px; opacity: 0; transform: translateY(8px); transition: all 0.2s; pointer-events: none; z-index: 999; }
.toast.show { opacity: 1; transform: translateY(0); }

/* Loading */
.loading { padding: 48px; text-align: center; color: var(--steel); font-size: 14px; }
.sort-bar { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
.sort-label { font-size: 12px; color: var(--steel); }
</style>
</head>

      authority: `https://login.microsoftonline.com/${SP_CONFIG.tenantId}`,
      redirectUri: SP_CONFIG.redirectUri
    },
    cache: { cacheLocation: 'sessionStorage' }
  });
  await msalInstance.initialize();
  const result = await msalInstance.handleRedirectPromise();
  if (result) {
    accessToken = result.accessToken;
    showApp();
    await loadMembers();
  } else {
    const accounts = msalInstance.getAllAccounts();
    if (accounts.length > 0) {
      showApp();
      await loadMembers();
    }
  }
}

async function login() {
  try {
    document.getElementById('loginError').style.display = 'none';
    if (!msalInstance) await initMsal();
    await msalInstance.loginRedirect({
      scopes: ['https://bellweather.sharepoint.com/AllSites.Manage']
    });
  } catch (err) {
    console.error('Login failed:', err);
    const el = document.getElementById('loginError');
    el.textContent = 'Login failed: ' + (err.message || 'Unknown error.');
    el.style.display = 'block';
  }
}

function showApp() {
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('appContainer').style.display = 'block';
  document.getElementById('connDot').style.background = '#2d8a5e';
  document.getElementById('connLabel').textContent = 'SharePoint';
}

async function getToken() {
  const accounts = msalInstance.getAllAccounts();
  if (!accounts.length) throw new Error('Not signed in');
  const resp = await msalInstance.acquireTokenSilent({
    scopes: ['https://bellweather.sharepoint.com/AllSites.Manage'],
    account: accounts[0]
  });
  return resp.accessToken;
}

async function spFetch(url, options = {}) {
  if (!accessToken) accessToken = await getToken();
  const headers = {
    'Authorization': `Bearer ${accessToken}`,
    'Accept': 'application/json;odata=nometadata',
    'Content-Type': 'application/json;odata=nometadata',
    ...(options.headers || {})
  };
  let resp = await fetch(url, { ...options, headers });
  if (resp.status === 401) {
    accessToken = await getToken();
    headers.Authorization = `Bearer ${accessToken}`;
    resp = await fetch(url, { ...options, headers });
  }
  if (!resp.ok && resp.status !== 204) {
    const text = await resp.text();
    throw new Error(`SharePoint error ${resp.status}: ${text}`);
  }
  return resp;
}

async function loadMembers() {
  try {
    const resp = await spFetch(`${listApiUrl()}/items?$select=Id,EmployeeName,Department,Active,SortOrder&$orderby=SortOrder asc&$top=500`);
    const data = await resp.json();
    members = (data.value || []).map(item => ({
      id: String(item.Id),
      name: item.EmployeeName || '',
      department: item.Department || '',
      active: item.Active !== false,
      sortOrder: item.SortOrder || 0
    }));
    renderList();
  } catch (err) {
    console.error(err);
    document.getElementById('memberList').innerHTML = `<div class="empty-state">Error loading members: ${err.message}</div>`;
  }
}

let currentSort = 'name';
function sortBy(field) {
  currentSort = field;
  renderList();
}

function getSorted() {
  return [...members].sort((a, b) => {
    if (currentSort === 'department') return a.department.localeCompare(b.department) || a.name.localeCompare(b.name);
    if (currentSort === 'sortOrder') return (a.sortOrder - b.sortOrder) || a.name.localeCompare(b.name);
    return a.name.localeCompare(b.name);
  });
}

function renderList() {
  const sorted = getSorted();
  if (!sorted.length) {
    document.getElementById('memberList').innerHTML = '<div class="empty-state">No team members yet. Add one above.</div>';
    return;
  }
  document.getElementById('memberList').innerHTML = sorted.map(m => {
    if (editingId === m.id) {
      return `<div class="member-row editing" data-id="${m.id}">
        <div><input class="edit-input" id="editName_${m.id}" value="${escHtml(m.name)}" placeholder="Name"></div>
        <div>
          <select class="edit-select" id="editDept_${m.id}">
            <option value="">—</option>
            ${DEPTS.map(d => `<option value="${d}" ${m.department === d ? 'selected' : ''}>${d}</option>`).join('')}
          </select>
        </div>
        <div>
          <select class="edit-select" id="editActive_${m.id}">
            <option value="true" ${m.active ? 'selected' : ''}>Active</option>
            <option value="false" ${!m.active ? 'selected' : ''}>Inactive</option>
          </select>
        </div>
        <div class="row-actions">
          <button class="btn btn-save btn-sm" onclick="saveEdit('${m.id}')">Save</button>
          <button class="btn btn-ghost btn-sm" onclick="cancelEdit()">Cancel</button>
        </div>
      </div>`;
    }
    return `<div class="member-row" data-id="${m.id}">
      <div class="member-name">${escHtml(m.name)}</div>
      <div class="member-dept">${escHtml(m.department)}</div>
      <div><span class="active-badge ${m.active ? 'yes' : 'no'}">${m.active ? '● Active' : '○ Inactive'}</span></div>
      <div class="row-actions">
        <button class="btn btn-ghost btn-sm" onclick="startEdit('${m.id}')">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteMember('${m.id}')">Delete</button>
      </div>
    </div>`;
  }).join('');
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function startEdit(id) {
  editingId = id;
  renderList();
  const input = document.getElementById(`editName_${id}`);
  if (input) input.focus();
}

function cancelEdit() {
  editingId = null;
  renderList();
}

async function saveEdit(id) {
  const name = document.getElementById(`editName_${id}`).value.trim();
  const dept = document.getElementById(`editDept_${id}`).value;
  const active = document.getElementById(`editActive_${id}`).value === 'true';
  if (!name) { showToast('Name is required.'); return; }
  try {
    await spFetch(`${listApiUrl()}/items(${parseInt(id)})`, {
      method: 'POST',
      headers: { 'X-HTTP-Method': 'MERGE', 'IF-MATCH': '*' },
      body: JSON.stringify({ EmployeeName: name, Department: dept, Active: active })
    });
    const m = members.find(x => x.id === id);
    if (m) { m.name = name; m.department = dept; m.active = active; }
    editingId = null;
    renderList();
    showToast('Saved.');
  } catch (err) {
    console.error(err);
    showToast('Error saving: ' + err.message);
  }
}

async function addMember() {
  const name = document.getElementById('newName').value.trim();
  const dept = document.getElementById('newDept').value;
  if (!name) { showToast('Enter a name first.'); return; }
  try {
    const maxSort = members.length ? Math.max(...members.map(m => m.sortOrder || 0)) : 0;
    const resp = await spFetch(`${listApiUrl()}/items`, {
      method: 'POST',
      body: JSON.stringify({ EmployeeName: name, Department: dept, Active: true, SortOrder: maxSort + 10 })
    });
    const item = await resp.json();
    members.push({ id: String(item.Id), name: item.EmployeeName, department: item.Department || '', active: true, sortOrder: item.SortOrder || 0 });
    document.getElementById('newName').value = '';
    document.getElementById('newDept').value = '';
    renderList();
    showToast(`${name} added.`);
  } catch (err) {
    console.error(err);
    showToast('Error adding member: ' + err.message);
  }
}

async function deleteMember(id) {
  const m = members.find(x => x.id === id);
  if (!m) return;
  if (!confirm(`Remove ${m.name} from the team roster?`)) return;
  try {
    await spFetch(`${listApiUrl()}/items(${parseInt(id)})`, {
      method: 'POST',
      headers: { 'X-HTTP-Method': 'DELETE', 'IF-MATCH': '*' }
    });
    members = members.filter(x => x.id !== id);
    renderList();
    showToast(`${m.name} removed.`);
  } catch (err) {
    console.error(err);
    showToast('Error deleting: ' + err.message);
  }
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// Init
window.addEventListener('load', () => initMsal().catch(console.error));
</script>
</body>
</html>
