<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sherpa Lookup Tester</title>
<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
<!-- In production these would load from /lib/. For local testing they can be same-directory. -->
<script src="lib/sherpa-auth.js"></script>
   <script src="lib/sherpa-lookup.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #f5f3ee;
    color: #1f2e3e;
    padding: 32px;
    max-width: 900px;
    margin: 0 auto;
    line-height: 1.55;
    font-size: 13px;
  }
  h1 { font-size: 22px; margin-bottom: 4px; }
  .sub { font-size: 12px; color: #7a7a7a; margin-bottom: 24px; }
  .panel {
    background: #fff;
    border: 1px solid #e4dac4;
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .panel h2 { font-size: 14px; font-weight: 600; margin-bottom: 12px; }

  .auth-state { display: flex; align-items: center; gap: 12px; font-size: 12px; }
  .auth-state.signed-in { color: #00521b; }
  .auth-state.signed-out { color: #a30a0a; }

  label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #7a7a7a; margin-bottom: 4px; }
  input, select {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid #e4dac4;
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    background: #fff;
    margin-bottom: 12px;
  }
  input:focus, select:focus { outline: none; border-color: #d8b64f; }

  button {
    padding: 8px 16px;
    border: none;
    border-radius: 6px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    background: #1f2e3e;
    color: #d8b64f;
  }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.ghost { background: transparent; color: #7a7a7a; border: 1px solid #e4dac4; }

  .result-panel { display: none; }
  .result-panel.show { display: block; }
  .status-line {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 600;
    padding: 10px 14px;
    border-radius: 6px;
    margin-bottom: 16px;
  }
  .status-confident { background: #e8f4ee; color: #00521b; border: 1px solid #a3d4b5; }
  .status-ambiguous { background: #fffbeb; color: #92400e; border: 1px solid #fcd34d; }
  .status-none      { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }

  .file-row {
    padding: 10px 12px;
    border: 1px solid #e4dac4;
    border-radius: 6px;
    margin-bottom: 6px;
    background: #fafafa;
  }
  .file-row.top { background: #fff; border-color: #d8b64f; }
  .file-name { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
  .file-meta { font-size: 11px; color: #7a7a7a; display: flex; gap: 12px; flex-wrap: wrap; }
  .file-meta a { color: #1f2e3e; text-decoration: underline; text-decoration-color: #e4dac4; }
  .file-meta a:hover { text-decoration-color: #d8b64f; }
  .score { font-family: ui-monospace, monospace; color: #1f2e3e; background: #f5f3ee; padding: 1px 6px; border-radius: 3px; }

  .raw {
    background: #1f2e3e;
    color: #d8b64f;
    padding: 12px;
    border-radius: 6px;
    font-family: ui-monospace, 'SF Mono', Consolas, monospace;
    font-size: 11px;
    line-height: 1.5;
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .loading { color: #7a7a7a; font-size: 12px; }
</style>
</head>
<body>

<h1>Sherpa Lookup Tester</h1>
<div class="sub">Test harness for <code>SherpaLookup.find()</code> against real SharePoint data.</div>

<div class="panel">
  <h2>Authentication</h2>
  <div id="auth-state" class="auth-state signed-out">Not signed in</div>
  <div style="margin-top: 12px; display: flex; gap: 8px;">
    <button id="btn-signin">Sign in</button>
    <button id="btn-signout" class="ghost" style="display:none">Sign out</button>
  </div>
</div>

<div class="panel">
  <h2>Query</h2>
  <label for="project">Project name (last name or fragment)</label>
  <input id="project" type="text" placeholder="e.g. Curry, Lebow, Blades" value="Curry">

  <label for="source-type">Source type</label>
  <select id="source-type">
    <option value="scope_outline">Scope Outline</option>
    <option value="design_agreement">Design Agreement</option>
    <option value="construction_agreement">Construction Agreement</option>
    <option value="selections">BuilderTrend Selections</option>
    <option value="estimate">Estimate</option>
    <option value="plans">Plans</option>
    <option value="permit">Permit</option>
  </select>

  <button id="btn-find" disabled>Find</button>
</div>

<div id="result-panel" class="panel result-panel">
  <h2>Result</h2>
  <div id="status-line" class="status-line"></div>
  <div id="query-info" style="font-size: 11px; color: #7a7a7a; margin-bottom: 12px;"></div>
  <h3 style="font-size: 12px; font-weight: 600; margin-bottom: 8px;">Top match</h3>
  <div id="top-match"></div>
  <h3 style="font-size: 12px; font-weight: 600; margin: 16px 0 8px;">All candidates</h3>
  <div id="all-candidates"></div>
  <h3 style="font-size: 12px; font-weight: 600; margin: 16px 0 8px;">Raw response (for debugging)</h3>
  <div id="raw-response" class="raw"></div>
</div>

<script>
async function main() {
  const authState   = document.getElementById('auth-state');
  const btnSignin   = document.getElementById('btn-signin');
  const btnSignout  = document.getElementById('btn-signout');
  const btnFind     = document.getElementById('btn-find');

  await SherpaAuth.init();
  updateAuthUI();

  btnSignin.addEventListener('click', () => SherpaAuth.signIn());
  btnSignout.addEventListener('click', () => SherpaAuth.signOut());
  btnFind.addEventListener('click', runFind);

  function updateAuthUI() {
    if (SherpaAuth.isSignedIn()) {
      const acct = SherpaAuth.getAccount();
      authState.className = 'auth-state signed-in';
      authState.textContent = 'Signed in as ' + (acct.username || acct.name || 'user');
      btnSignin.style.display = 'none';
      btnSignout.style.display = 'inline-block';
      btnFind.disabled = false;
    } else {
      authState.className = 'auth-state signed-out';
      authState.textContent = 'Not signed in';
      btnSignin.style.display = 'inline-block';
      btnSignout.style.display = 'none';
      btnFind.disabled = true;
    }
  }

  async function runFind() {
    const project = document.getElementById('project').value.trim();
    const sourceType = document.getElementById('source-type').value;
    const resultPanel = document.getElementById('result-panel');

    if (!project) { alert('Enter a project name'); return; }

    btnFind.disabled = true;
    btnFind.textContent = 'Searching…';
    resultPanel.classList.add('show');
    document.getElementById('status-line').className = 'status-line';
    document.getElementById('status-line').textContent = 'Searching…';
    document.getElementById('top-match').innerHTML = '<div class="loading">Loading…</div>';
    document.getElementById('all-candidates').innerHTML = '';
    document.getElementById('query-info').textContent = '';
    document.getElementById('raw-response').textContent = '';

    try {
      const result = await SherpaLookup.find(project, sourceType);
      renderResult(result);
    } catch (e) {
      document.getElementById('status-line').className = 'status-line status-none';
      document.getElementById('status-line').textContent = 'Error: ' + e.message;
      document.getElementById('top-match').innerHTML = '';
      console.error(e);
    } finally {
      btnFind.disabled = false;
      btnFind.textContent = 'Find';
    }
  }

  function renderResult(result) {
    const statusLine = document.getElementById('status-line');
    const statusMap = {
      confident: { cls: 'status-confident', text: '✓ Confident match' },
      ambiguous: { cls: 'status-ambiguous', text: '⚠ Ambiguous — multiple candidates' },
      none:      { cls: 'status-none',      text: '✕ No suitable match found' },
    };
    const s = statusMap[result.status];
    statusLine.className = 'status-line ' + s.cls;
    statusLine.textContent = s.text;

    document.getElementById('query-info').textContent = 'Query sent to Graph: "' + result.query + '"';

    const topEl = document.getElementById('top-match');
    if (result.file) {
      topEl.innerHTML = renderFile(result.file, true);
    } else {
      topEl.innerHTML = '<div style="color:#7a7a7a;font-style:italic;">No match.</div>';
    }

    const allEl = document.getElementById('all-candidates');
    if (result.candidates.length) {
      allEl.innerHTML = result.candidates.map(c => renderFile(c, false)).join('');
    } else {
      allEl.innerHTML = '<div style="color:#7a7a7a;font-style:italic;">No candidates returned.</div>';
    }

    document.getElementById('raw-response').textContent = JSON.stringify(result, null, 2);
  }

  function renderFile(f, isTop) {
    const fileLink = f.webUrl ? `<a href="${f.webUrl}" target="_blank" rel="noopener">Open file ↗</a>` : '';
    const folderLink = f.folderUrl ? `<a href="${f.folderUrl}" target="_blank" rel="noopener">Open folder ↗</a>` : '';
    const pathText = f.path || '(path unavailable)';
    const dateStr = f.modified ? new Date(f.modified).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '—';
    const sizeStr = f.size ? fmtBytes(f.size) : '—';
    return `
      <div class="file-row ${isTop ? 'top' : ''}">
        <div class="file-name">${escHtml(f.name)}</div>
        <div class="file-meta">
          <span class="score">score: ${f.score != null ? f.score : '?'}</span>
          <span>📁 ${escHtml(pathText)}</span>
          <span>${dateStr}</span>
          <span>${sizeStr}</span>
          ${fileLink}
          ${folderLink}
        </div>
      </div>
    `;
  }

  function fmtBytes(b) {
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b / 1024).toFixed(0) + ' KB';
    return (b / 1048576).toFixed(1) + ' MB';
  }

  function escHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
}

main().catch(e => {
  console.error('Init error:', e);
  document.getElementById('auth-state').textContent = 'Init error: ' + e.message;
});
</script>
</body>
</html>
